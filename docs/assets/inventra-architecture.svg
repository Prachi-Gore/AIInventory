<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">Inventra System Architecture</title>
  <desc id="desc">Layered architecture showing UI, LangGraph coordinator, agents, services, tools, databases, and external APIs.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#475569"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .title { font: 700 28px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 15px Arial, sans-serif; fill: #475569; }
      .layer { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.5; rx: 16; }
      .box { fill: #ffffff; stroke-width: 2; rx: 10; }
      .ui { stroke: #2563eb; }
      .graph { stroke: #7c3aed; }
      .agent { stroke: #d97706; }
      .service { stroke: #0891b2; }
      .data { stroke: #16a34a; }
      .external { stroke: #dc2626; }
      .label { font: 700 15px Arial, sans-serif; fill: #0f172a; }
      .small { font: 400 12.5px Arial, sans-serif; fill: #475569; }
      .layer-title { font: 700 13px Arial, sans-serif; fill: #334155; }
      .edge { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="1100" height="620"/>
  <text x="40" y="48" class="title">Inventra System Architecture</text>
  <text x="40" y="76" class="subtitle">A layered AI application: deterministic business logic plus OpenAI reasoning where recommendations are needed.</text>

  <rect x="40" y="105" width="1020" height="78" class="layer"/>
  <text x="60" y="128" class="layer-title">ENTRYPOINTS</text>
  <rect x="310" y="125" width="190" height="42" class="box ui"/>
  <text x="405" y="151" text-anchor="middle" class="label">Streamlit UI</text>
  <rect x="600" y="125" width="190" height="42" class="box ui"/>
  <text x="695" y="151" text-anchor="middle" class="label">CLI / main.py</text>

  <rect x="40" y="210" width="1020" height="82" class="layer"/>
  <text x="60" y="233" class="layer-title">ORCHESTRATION</text>
  <rect x="415" y="232" width="270" height="42" class="box graph"/>
  <text x="550" y="258" text-anchor="middle" class="label">LangGraph Coordinator</text>

  <rect x="40" y="320" width="1020" height="92" class="layer"/>
  <text x="60" y="343" class="layer-title">AGENT LAYER</text>
  <rect x="210" y="348" width="210" height="44" class="box agent"/>
  <text x="315" y="374" text-anchor="middle" class="label">Report Agent</text>
  <rect x="455" y="348" width="210" height="44" class="box agent"/>
  <text x="560" y="374" text-anchor="middle" class="label">Decision Agent</text>
  <rect x="700" y="348" width="210" height="44" class="box agent"/>
  <text x="805" y="374" text-anchor="middle" class="label">MCP Server</text>

  <rect x="40" y="440" width="1020" height="82" class="layer"/>
  <text x="60" y="463" class="layer-title">SERVICES AND TOOLS</text>
  <rect x="115" y="462" width="185" height="42" class="box service"/>
  <text x="207" y="488" text-anchor="middle" class="label">Data Pipeline</text>
  <rect x="330" y="462" width="185" height="42" class="box service"/>
  <text x="422" y="488" text-anchor="middle" class="label">Ticket Manager</text>
  <rect x="545" y="462" width="185" height="42" class="box service"/>
  <text x="637" y="488" text-anchor="middle" class="label">Weather Tool</text>
  <rect x="760" y="462" width="185" height="42" class="box service"/>
  <text x="852" y="488" text-anchor="middle" class="label">Finance Tool</text>

  <rect x="40" y="550" width="1020" height="52" class="layer"/>
  <text x="60" y="573" class="layer-title">DATA AND EXTERNAL SYSTEMS</text>
  <rect x="250" y="565" width="160" height="28" class="box data"/>
  <text x="330" y="584" text-anchor="middle" class="small">SQLite + CSV seed data</text>
  <rect x="470" y="565" width="160" height="28" class="box external"/>
  <text x="550" y="584" text-anchor="middle" class="small">OpenAI API</text>
  <rect x="690" y="565" width="160" height="28" class="box external"/>
  <text x="770" y="584" text-anchor="middle" class="small">OpenWeather / HF APIs</text>

  <path d="M405 167 V232" class="edge"/>
  <path d="M695 167 V232" class="edge"/>
  <path d="M550 274 V348" class="edge"/>
  <path d="M550 274 C460 304 360 318 315 348" class="edge"/>
  <path d="M550 274 C665 304 760 318 805 348" class="edge"/>
  <path d="M315 392 C285 425 240 438 207 462" class="edge"/>
  <path d="M560 392 C545 425 575 438 637 462" class="edge"/>
  <path d="M560 392 C495 430 455 438 422 462" class="edge"/>
  <path d="M207 504 C240 532 290 548 330 565" class="edge"/>
  <path d="M422 504 C390 532 365 548 330 565" class="edge"/>
  <path d="M637 504 C675 532 725 548 770 565" class="edge"/>
  <path d="M852 504 C720 532 620 548 550 565" class="edge"/>
  <path d="M560 392 C560 460 550 520 550 565" class="edge"/>
</svg>
