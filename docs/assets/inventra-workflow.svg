<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520" role="img" aria-labelledby="title desc">
  <title id="title">Inventra LangGraph Workflow</title>
  <desc id="desc">User query flows through Streamlit or CLI into a LangGraph coordinator with classify, gather, decide, and respond nodes.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 28px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 15px Arial, sans-serif; fill: #475569; }
      .node { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 12; }
      .node-alt { fill: #ecfeff; stroke: #0891b2; stroke-width: 2; rx: 12; }
      .node-ai { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 12; }
      .node-db { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; rx: 12; }
      .label { font: 700 16px Arial, sans-serif; fill: #0f172a; }
      .small { font: 400 13px Arial, sans-serif; fill: #475569; }
      .edge { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .hint { font: 700 12px Arial, sans-serif; fill: #334155; }
    </style>
  </defs>
  <rect class="bg" width="1100" height="520"/>
  <text x="40" y="48" class="title">Inventra Request Workflow</text>
  <text x="40" y="76" class="subtitle">How a user question becomes an inventory, finance, ticket, or AI recommendation response.</text>

  <rect x="50" y="135" width="160" height="82" class="node-alt"/>
  <text x="130" y="166" text-anchor="middle" class="label">User</text>
  <text x="130" y="190" text-anchor="middle" class="small">Natural language query</text>

  <rect x="260" y="135" width="170" height="82" class="node-alt"/>
  <text x="345" y="166" text-anchor="middle" class="label">UI / CLI</text>
  <text x="345" y="190" text-anchor="middle" class="small">Streamlit or terminal</text>

  <rect x="480" y="135" width="180" height="82" class="node"/>
  <text x="570" y="166" text-anchor="middle" class="label">Coordinator</text>
  <text x="570" y="190" text-anchor="middle" class="small">process_query()</text>

  <rect x="720" y="88" width="180" height="78" class="node-ai"/>
  <text x="810" y="118" text-anchor="middle" class="label">Classify Node</text>
  <text x="810" y="142" text-anchor="middle" class="small">intent, region, sku</text>

  <rect x="720" y="210" width="180" height="78" class="node-db"/>
  <text x="810" y="240" text-anchor="middle" class="label">Gather Node</text>
  <text x="810" y="264" text-anchor="middle" class="small">reports, tickets, DB</text>

  <rect x="720" y="332" width="180" height="78" class="node-ai"/>
  <text x="810" y="362" text-anchor="middle" class="label">Decide Node</text>
  <text x="810" y="386" text-anchor="middle" class="small">OpenAI + tools</text>

  <rect x="950" y="210" width="120" height="78" class="node"/>
  <text x="1010" y="240" text-anchor="middle" class="label">Respond</text>
  <text x="1010" y="264" text-anchor="middle" class="small">format answer</text>

  <path d="M210 176 H260" class="edge"/>
  <path d="M430 176 H480" class="edge"/>
  <path d="M660 176 C690 176 688 127 720 127" class="edge"/>
  <path d="M810 166 V210" class="edge"/>
  <path d="M810 288 V332" class="edge"/>
  <path d="M900 249 H950" class="edge"/>
  <path d="M900 371 C945 371 940 288 950 263" class="edge"/>
  <path d="M1010 288 C1010 455 130 455 130 217" class="edge"/>

  <text x="695" y="102" class="hint">1</text>
  <text x="695" y="231" class="hint">2</text>
  <text x="695" y="354" class="hint">3</text>
  <text x="934" y="232" class="hint">4</text>
</svg>
